<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Link Test</title>
  <style>
    body { background: #1C1C1E; color: #fff; font-family: sans-serif; padding: 20px;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 100vh; }
    button { display: block; width: 100%; background: #FF6B35; color: #fff; padding: 18px;
        border-radius: 12px; text-decoration: none; text-align: center; margin: 10px 0;
        font-size: 18px; font-weight: 600; border: none; cursor: pointer; }
    h3 { color: #8E8E93; margin-top: 24px; font-size: 13px; width: 100%; }
    p { color: #D1D1D6; font-size: 14px; text-align: center; }
  </style>
</head>
<body>
  <h3>26. One-click: warm up + redirect (2s delay)</h3>
  <button id="test26">Add to Calendar</button>
  <p id="status26"></p>

  <h3>27. One-click: warm up + redirect (3s delay)</h3>
  <button id="test27">Add to Calendar</button>
  <p id="status27"></p>

  <h3>28. One-click: warm up + redirect (4s delay)</h3>
  <button id="test28">Add to Calendar</button>
  <p id="status28"></p>

  <script>
    var eventUrl = 'https://calendar.google.com/calendar/event?action=TEMPLATE&dates=20260410T140000/20260410T150000&text=Test+Event&location=Test+Location';
    var warmUrl = 'https://calendar.google.com/calendar';

    function testWarmRedirect(btnId, statusId, delay) {
      document.getElementById(btnId).addEventListener('click', function() {
        // Step 1: open calendar app (warms it up)
        window.open(warmUrl);
        document.getElementById(statusId).textContent = 'Calendar opened, waiting ' + (delay/1000) + 's...';

        // Step 2: after delay, navigate to eventedit (app is warm now)
        setTimeout(function() {
          document.getElementById(statusId).textContent = 'Redirecting to event...';
          window.location.href = eventUrl;
        }, delay);
      });
    }

    testWarmRedirect('test26', 'status26', 2000);
    testWarmRedirect('test27', 'status27', 3000);
    testWarmRedirect('test28', 'status28', 4000);
  </script>
</body>
</html>
