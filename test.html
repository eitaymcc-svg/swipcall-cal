<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Link Test v5</title>
  <style>
    body { background: #1C1C1E; color: #fff; font-family: sans-serif; padding: 20px; }
    button { display: block; width: 100%; background: #FF6B35; color: #fff; padding: 16px;
        border-radius: 10px; text-align: center; margin: 6px 0;
        font-size: 16px; font-weight: 600; border: none; cursor: pointer; }
    h3 { color: #8E8E93; margin-top: 18px; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Hebrew Tests</h2>

  <h3>34H. form action=TEMPLATE + Hebrew</h3>
  <form action="https://calendar.google.com/calendar/event" method="GET">
    <input type="hidden" name="action" value="TEMPLATE">
    <input type="hidden" name="dates" value="20260410T140000/20260410T150000">
    <input type="hidden" name="text" value="תיקון מזגן - שם העסק">
    <input type="hidden" name="location" value="רחוב הרצל 5, תל אביב">
    <button type="submit">Test 34H</button>
  </form>

  <h3>35H. form www.google.com/calendar + Hebrew</h3>
  <form action="https://www.google.com/calendar/render" method="GET">
    <input type="hidden" name="action" value="TEMPLATE">
    <input type="hidden" name="dates" value="20260410T140000/20260410T150000">
    <input type="hidden" name="text" value="תיקון מזגן - שם העסק">
    <input type="hidden" name="location" value="רחוב הרצל 5, תל אביב">
    <button type="submit">Test 35H</button>
  </form>
</body>
</html>
