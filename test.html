<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Test v6</title>
  <style>
    body { background: #1C1C1E; color: #fff; font-family: sans-serif; padding: 20px;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 100vh; }
    button { background: #FF6B35; color: #fff; padding: 18px 40px; border-radius: 12px;
        font-size: 18px; font-weight: 600; border: none; cursor: pointer; margin-top: 24px; }
    p { color: #D1D1D6; font-size: 14px; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <form action="https://calendar.google.com/calendar/event" method="GET" id="calForm">
    <input type="hidden" name="action" value="TEMPLATE">
    <input type="hidden" name="dates" value="20260410T140000/20260410T150000">
    <input type="hidden" name="text" value="תיקון מזגן - טסט">
    <input type="hidden" name="location" value="רחוב הרצל 5, תל אביב">
    <button type="submit">Add to Calendar</button>
  </form>
  <p id="status"></p>

  <script>
    var submitted = false;

    document.getElementById('calForm').addEventListener('submit', function() {
      submitted = true;
    });

    // When user returns to this page (Calendar app opened to home and user pressed back),
    // auto-submit again - Calendar is now warm so event details will show.
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden && submitted) {
        submitted = false; // prevent infinite loop
        document.getElementById('status').textContent = 'Opening again...';
        setTimeout(function() {
          document.getElementById('calForm').submit();
        }, 500);
      }
    });
  </script>
</body>
</html>
